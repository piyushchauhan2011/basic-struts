# Optional RMI client mode for the web app (learning demo).
# When true, GreetingService calls the standalone greeting-rmi-server (second JVM).
# Override with -Dgreeting.rmi.enabled=true on the JVM command line.
greeting.rmi.enabled=false
greeting.rmi.host=localhost
greeting.rmi.port=1099
greeting.rmi.name=GreetingService
